name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-amd64
            self_update_name: tapd-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-arm64
            use-cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: darwin-arm64
            self_update_name: tapd-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build
        run: ${{ matrix.use-cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - name: Strip binary
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/tapd || true

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: tar czf tapd-${{ matrix.artifact }}.tar.gz -C target/${{ matrix.target }}/release tapd

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: 7z a tapd-${{ matrix.artifact }}.zip ./target/${{ matrix.target }}/release/tapd.exe

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: tapd-${{ matrix.artifact }}
          path: tapd-${{ matrix.artifact }}.*

      - name: Prepare self-update binary
        if: matrix.self_update_name
        run: cp target/${{ matrix.target }}/release/tapd ${{ matrix.self_update_name }}

      - name: Upload self-update binary
        if: matrix.self_update_name
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.self_update_name }}
          path: ${{ matrix.self_update_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: tapd-*
